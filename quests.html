<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusForge — Quest Log</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a href="index.html">The Forge</a>
    <a href="quests.html">Quest Log</a>
    <a href="about.html">About</a>
  </nav>

  <div id="header">
    <div id="player-name" onclick="editName()" title="Click to edit">Hero</div>
    <div id="level-display">Level 1</div>
    <div id="xp-bar-track">
      <div id="xp-bar"></div>
    </div>
    <div id="stats">
      <span id="streak-display">Streak: 0</span>
      <span id="token-display">Tokens: 0</span>
    </div>
  </div>

  <div id="quest-form">
    <input type="text" id="quest-input" placeholder="Enter quest name..." />
    <select id="difficulty-select">
      <option value="easy">Easy — 50 XP</option>
      <option value="medium">Medium — 150 XP</option>
      <option value="epic">Epic — 350 XP</option>
      <option value="boss">Boss — 800 XP</option>
    </select>
    <button onclick="handleAddQuest()">Add Quest</button>
  </div>

  <div id="quest-list"></div>
  <div id ="completed-section">
    <h3 onclick="toggleCompleted()" style="cursor:pointer">
      Completed Quests <span id = "completed-toggle">▼ </span>
    </h3>
    <div id = "completed-list"></div>
  </div>

  <div id="message"></div>

  <script src="app.js"></script>
</body>
</html>
