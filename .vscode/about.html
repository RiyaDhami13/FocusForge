<div id = "about-content">
  <h2>How to Play</h2>
  <p>1. Add quests in the Quest Log.</p>
  <p>2. Select a quest to target it.</p>
  <p>3. Start a focus session on the forge.</p>
  <p>4. Complete sessions to earn XP.</p>
  <p>5. Complete quests for bonus XP.</p>
  <p>6. Come back daily to keep your streak alive.</p>
</div>

</div>
